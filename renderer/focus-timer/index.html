<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Timer — FounderOS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <header class="header">
      <span class="brand">FounderOS</span>
      <div class="header-right">
        <span class="app-name">Focus Timer</span>
        <span class="status-dot" id="statusDot" title="Backend offline — sessions not saved"></span>
      </div>
    </header>

    <main class="main">

      <!-- Pomodoro cycle indicator -->
      <div class="cycle-dots" id="cycleDots">
        <span class="cdot" data-i="0"></span>
        <span class="cdot" data-i="1"></span>
        <span class="cdot" data-i="2"></span>
        <span class="cdot" data-i="3"></span>
      </div>

      <!-- Mode pill -->
      <div class="mode-pill" id="modePill">FOCUS</div>

      <!-- Timer ring -->
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
          <circle class="ring-track" cx="110" cy="110" r="96"/>
          <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="96"/>
        </svg>
        <div class="ring-inner">
          <div class="timer-display" id="timerDisplay">25:00</div>
          <div class="session-label" id="sessionLabel">Ready</div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="btn icon-btn" id="resetBtn" title="Reset">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
        </button>
        <button class="btn primary-btn" id="startBtn">Start</button>
        <button class="btn icon-btn" id="skipBtn" title="Skip session">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 4 15 12 5 20 5 4"/>
            <line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>
      </div>

      <!-- Mode switcher -->
      <div class="mode-tabs">
        <button class="tab active" data-mode="focus">Focus</button>
        <button class="tab" data-mode="short_break">Short Break</button>
        <button class="tab" data-mode="long_break">Long Break</button>
      </div>

    </main>

    <!-- Stats footer -->
    <footer class="stats">
      <div class="stat">
        <span class="stat-val" id="statSessions">—</span>
        <span class="stat-key">Sessions</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <span class="stat-val" id="statMinutes">—</span>
        <span class="stat-key">Minutes</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <span class="stat-val" id="statBreaks">—</span>
        <span class="stat-key">Breaks</span>
      </div>
    </footer>

  </div>
  <script src="app.js"></script>
</body>
</html>
